name: Generate 10k TMDB Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run TMDB Bot (10k Pages)
        run: |
          python mega_bot.py --limit 9000

      - name: Build Homepage
        run: |
          python build_homepage.py

      - name: Generate Sitemap
        run: |
          python generate_full_sitemap.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --global core.quotepath false
          git add .
          git commit -m "Automated update: Generated 10,000 pages, updated homepage and sitemap" || echo "No changes to commit"
          git push origin main
