name: Update Actor Pages With Filmography

on:
  schedule:
    # Kol nhara f 23:00 UTC = 00:00 Morocco (UTC+1)
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  update-actors:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update Actor Pages (100 movies + 100 TV per actor)
        run: |
          python update_actors.py

      - name: Commit and Push updated actor pages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git config --global core.quotepath false
          git add actor/
          git commit -m "chore: updated actor pages with latest filmography [skip ci]" || echo "No changes to commit"
          git push origin main
