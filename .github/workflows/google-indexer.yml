name: Google Indexing API

on:
  schedule:
    # كيخدم كل ليلة مع 12 د الليل بتوقيت UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # هادي هي اللي كتعطيك زر "Run workflow" باش تخدمو وقتما بغيتي

jobs:
  index:
    runs-on: ubuntu-latest
    
    # --- هاد الجزء هو الحل ديال مشكل 403 اللي عندك ---
    permissions:
      contents: write
    # -----------------------------------------------

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-auth requests

      - name: Run Indexing Script
        env:
          GCP_INDEXING_KEY: ${{ secrets.GCP_INDEXING_KEY }}
        run: |
          python google_indexer.py

      - name: Commit Progress
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add indexer_progress.json
          # إيلا مكان حتى تغيير، السكريبت ماغاديش يعطيك خطأ
          git commit -m "chore: update google indexer progress [skip ci]" || echo "No changes to commit"
          git push
